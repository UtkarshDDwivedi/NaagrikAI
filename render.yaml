services:
  - type: web
    name: naagrikai-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: naagrikai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_RISK_MODEL
        value: gpt-4o-mini

databases:
  - name: naagrikai-db
    plan: free
